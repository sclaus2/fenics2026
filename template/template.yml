jtex: v1
title: 'FEniCS Conference Abstract Template'
description: 'Template for the FEniCS book of abstracts'
version: 1.0.0
license: CC-BY-4.0
source: 'https://github.com/FEniCS2026'
thumbnail: ./thumbnail.png
authors:
  - name: 'FEniCS Conference Organizers'
tags:
  - paper
options:
  - id: logo
    type: boolean
    default: true
    title: FEniCS Logo
    description: >
      This will add a clickable FEniCS logo after the abstract with a link
      to the FEniCS conference website.
files:
  - template.tex
  - fenics-logo.png
  - fenicsconf.def
  - fenicsconf.sty
packages:
  - datetime
  - graphicx
  - hyperref
  - natbib
